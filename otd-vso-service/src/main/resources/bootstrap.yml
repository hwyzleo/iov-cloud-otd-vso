spring:
  application:
    name: otd-vso
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_URL}
        namespace: 32c13f29-1aa6-468a-bacb-81be7f437dc9
      config:
        server-addr: ${NACOS_URL}
        namespace: 32c13f29-1aa6-468a-bacb-81be7f437dc9
